<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo dos Jogos</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🎮 Mundo dos Jogos 🎮</h1>

    <p>
        Bem-vindo ao meu site sobre jogos, tecnologia e diversão!
    </p>

    <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200"
         alt="Imagem Gamer">

    <br><br>

    <button onclick="mensagem()">
        Clique Aqui
    </button>

    <h2>Tabela Explicativa</h2>

    <table>

        <tr>
            <th>Tag ou Comando</th>
            <th>Função</th>
        </tr>

        <tr>
            <td>&lt;h1&gt;</td>
            <td>Título principal</td>
        </tr>

        <tr>
            <td>&lt;p&gt;</td>
            <td>Cria um parágrafo</td>
        </tr>

        <tr>
            <td>color</td>
            <td>Define a cor do texto</td>
        </tr>

        <tr>
            <td>background-color</td>
            <td>Define a cor do fundo</td>
        </tr>

        <tr>
            <td>alert()</td>
            <td>Mostra uma mensagem</td>
        </tr>

        <tr>
            <td>onclick</td>
            <td>Executa ação ao clicar</td>
        </tr>

    </table>

    <script src="script.js"></script>

</body>

</html>
